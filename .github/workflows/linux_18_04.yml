name: Build on Ubuntu 22.04

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release Tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

# REQUIRED: Grant the action permission to create a release in your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl git unzip xz-utils zip libglu1-mesa \
            clang cmake ninja-build pkg-config libgtk-3-dev \
            libstdc++-12-dev libfuse2

      - name: Prepare assets directory
        run: mkdir -p assets/database

      - name: Download zip file
        run: |
          mkdir -p assets/database
          curl -L -o assets/database/tipitaka_pali.zip "https://www.dropbox.com/scl/fi/18cwqb6hyr81ws6n8aeyh/tipitaka_pali.db.zip?rlkey=lpiuyk3amqm9hrxpq007sb45m&st=ktchca1x&dl=1"
      - name: Extract zip file
        run: unzip -o assets/database/tipitaka_pali.zip -d assets/database/

      - name: Delete zip file
        run: rm -f assets/database/tipitaka_pali.zip

      - name: Run split.sh script inside assets/database
        run: |
          cd assets/database
          chmod +x split.sh
          ./split.sh

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Flutter build (Linux)
        run: |
          flutter pub get
          flutter build linux --release

      - name: Make build_appimage2.sh executable
        run: chmod +x build_appimage2.sh

      - name: Build AppImage via script
        run: ./build_appimage2.sh

      - name: Extract AppImage
        run: |
          chmod +x tipitaka_pali_reader.AppImage
          ./tipitaka_pali_reader.AppImage --appimage-extract
          mv squashfs-root TPR-Bundle
          chmod +x TPR-Bundle/tipitaka_pali_reader || true

      - name: Compress Bundles for Release
        run: |
          # GitHub Releases require files, not folders. We must zip the directories.
          zip -r TPR-Bundle-Linux.zip TPR-Bundle/
          
          # Navigate to the linux build bundle and zip it securely
          cd build/linux/x64/release/
          zip -r ../../../../linux-build-bundle.zip bundle/
          cd ../../../../

      # (Optional) You can keep the artifact uploads if you still want them attached to the Action run summary
      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: tipitaka_pali_reader.AppImage

      # NEW: Creates the GitHub Release and attaches the AppImage and the zipped bundles
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: Tipiṭaka Pāḷi Reader Linux ${{ github.event.inputs.version_tag }}
          draft: false
          prerelease: false
          files: |
            tipitaka_pali_reader.AppImage
            TPR-Bundle-Linux.zip
            linux-build-bundle.zip
